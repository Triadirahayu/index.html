<!DOCTYPE html>
<html>
<head>
    <title>Website Tri Adi Rahayu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6d4c41, #d7ccc8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #6d4c41;
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #6d4c41;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #4e342e;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Halo, saya Tri Adi</h1>
        <p>Ini website pertama saya 🚀</p>
        <button class="btn">Klik Saya</button>
    </div>

</body>
</html>
